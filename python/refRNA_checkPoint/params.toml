# polyA 转录组质控参数（TOML）
# 指标阈值使用区间：合格值为 min <= x <= max（闭区间）；省略 min 表示无下界，省略 max 表示无上界。

[thresholds]
Read1WithAdapter = { min = 0, max = 10 }
Read2WithAdapter = { min = 0, max = 10 }
PairsThatWereTooShort = { min = 0, max = 10 }
RawData = { min = 5.1 }
CleanData = { min = 4.6 }
Q20 = { min = 90 }
Q30 = { min = 90 }
GC = { min = 40, max = 55 }
Mappedreads = { min = 90 }
UniqueMappedreads = { min = 80 }
MultiMappedreads = { min = 0, max = 10 }
exon = { min = 50 }
intron = { max = 50 }
intergenic = { max = 20 }
CorrelationOfSample = { max = 0.1 }
DiffGeneNum = 10

# 差异基因：组内上调与下调同时小于 DiffGeneNum 则计为异常组（逻辑见 Check_Point）

